<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente de Estudos com IA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Assistente de Estudos</h1>
  </header>

<main class="container">
    <!-- COLUNA ESQUERDA: Controla o formulário, feedbacks e botões fixos -->
    <div class="coluna-esquerda">
      
      <form id="formCronograma">
        <label for="tema">Tema de estudo</label>
        <input type="text" id="tema" name="tema" required>

        <label for="tempo">Tempo disponível (ex: 5h/semana)</label>
        <input type="text" id="tempo" name="tempo" required>

        <button type="submit">Gerar cronograma</button>
      </form>

      <div id="feedback"></div>
      <div id="indicadorProgresso"></div>

    </div>
    <!-- COLUNA DIREITA: Onde o cronograma gigante e as caixas vão renderizar -->
    <div id="cronograma"></div>

  </main>

  <script src="js/foco-teclado.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
